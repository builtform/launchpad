name: Bug Report
description: Report a defect in LaunchPad's commands, agents, scripts, or generated docs.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in the fields below — they speed up triage and make a fix more likely.

        If your issue is specifically about plugin install failures, please use the **plugin install issue** template instead.

  - type: input
    id: lp-version
    attributes:
      label: LaunchPad version
      description: From `plugins/launchpad/.claude-plugin/plugin.json` `version` field, or `/plugin info launchpad@builtform`.
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: cc-version
    attributes:
      label: Claude Code version
      description: Output of `claude --version`.
      placeholder: "x.y.z"
    validations:
      required: true

  - type: dropdown
    id: install-path
    attributes:
      label: Install path
      description: How was LaunchPad installed in the affected project?
      options:
        - Plugin only (`/plugin install launchpad@builtform`)
        - Template (`./scripts/setup/init-project.sh`)
        - Local-path plugin (`/plugin marketplace add /path/to/clone`)
        - Other / unsure
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 14.5 / Ubuntu 22.04 / Windows 11 + WSL2"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal sequence of commands or actions that triggers the bug. Include the exact slash command if the bug surfaced inside Claude Code.
      placeholder: |
        1. Run `/lp-define` in a fresh repo
        2. Observe ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant output or logs
      description: Paste any error messages, command output, or audit-log lines. Redact secrets.
      render: shell
    validations:
      required: false

  - type: textarea
    id: extra-context
    attributes:
      label: Additional context
      description: Anything else that might help — repo size, polyglot stack, prior workarounds tried, etc.
    validations:
      required: false
