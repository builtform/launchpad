name: Tier-2 nightly real-network end-to-end

# Phase 4 v2.1 DA4 = c artifact. Nightly real-network execution of the
# canonical hot-path compositions (nextjs_standalone + astro AND
# nextjs_standalone + nextjs_fastapi) against actual upstream repos via
# GH_TOKEN-authenticated git ls-remote + git clone. Failures auto-open a
# GitHub Issue with the `nightly-failure` label; PR merges remain
# unblocked because Tier-2 runs separately from CI.
#
# Cron stagger: 04:00 UTC (cve-watch.yml runs at 02:00 UTC). 15-minute
# total budget. Scheduled-run verification is post-ship monitoring; the
# DoD only requires a manual workflow_dispatch trigger to pass.

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  canonical-hot-path-smoke:
    name: Tier-2 hot-path smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        composition:
          - name: "nextjs_standalone-plus-astro"
            stacks: "nextjs_standalone,astro"
          - name: "nextjs_standalone-plus-nextjs_fastapi"
            stacks: "nextjs_standalone,nextjs_fastapi"
    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Install Python deps
        run: |
          set -euo pipefail
          # v2.1 Codex PR #50 post-review P2: pin pip + pnpm exact
          # versions to make Tier-2 nightly reproducible. Floating
          # `--upgrade pip` was previously unpinned.
          python3 -m pip install pip==24.3.1
          python3 -m pip install -r plugins/launchpad/scripts/requirements.txt --require-hashes

      - name: Install pnpm
        run: npm install -g pnpm@9.0.0

      - name: Run Tier-1.5 cache + adapter tests with real network
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd plugins/launchpad/scripts
          python3 -m pytest tests/template_cache/ plugin_stack_adapters/tests/ -m slow --tb=short

      - name: Auto-open GitHub Issue on failure
        if: failure()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          COMPOSITION_NAME: ${{ matrix.composition.name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const compositionName = process.env.COMPOSITION_NAME;
            const runUrl = process.env.RUN_URL;
            const date = new Date().toISOString().slice(0, 10);
            const title = `Tier-2 nightly failed: ${compositionName} on ${date}`;
            const body = [
              `Run: ${runUrl}`,
              `Failing composition: ${compositionName}`,
              `Triage: see docs/maintainers/tier-2-nightly-triage.md`,
            ].join("\n");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["nightly-failure"],
            });
