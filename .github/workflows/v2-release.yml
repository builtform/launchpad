# verify-v2-ship — post-tag release verification (HANDSHAKE §12 + OPERATIONS
# §0 strip-back-aware Layer 7).
#
# v2.0 shipped the SIMPLIFIED single-shot battery per HANDSHAKE §1.5
# strip-back (originally 4 checks: steps 1-4, plus the step 0 semver shape
# guard). Steps 5 and 6 were added later to enforce the OPERATIONS §4 freshness
# contract at release time (step 5: catalog integrity + catalog/pattern
# freshness; step 6: the full §4 contract incl. pillar-framework + contract
# docs). The Layer 5 8-check battery (marketplace.json schema, automated
# reviews green, tag-protection content, pre-existing recall-tag 404 gate,
# exponential-backoff polling, `${{ github.run_id }}` self-loop break) is
# DEFERRED to v2.2 under BL-226 / BL-227 / BL-232. The checks below (steps
# 0-6) are load-bearing for v2.0 ship; the deferred 4 are load-bearing for v2.2.
#
# Trigger: tag push matching the `v*.*.*` glob; strict semver shape is
# enforced inside the job via a regex check on `${{ github.ref_name }}`.
# (Note: GitHub Actions tag filters are glob-only — `[0-9]+` would be parsed
# as literal characters, NOT a regex quantifier — so we keep the filter
# permissive and validate inside.) The `-yanked` / `-recalled` / `-rc*` /
# `-dryrun` suffix patterns intentionally do NOT pass the in-job regex per
# HANDSHAKE §10 + §12.
#
# All checks (steps 0-6) must pass for the tag to be considered
# "verified-shipped". Failure → §7.1 inline rollback procedure (delete tag from
# origin, ship a fresh patch on next ship attempt).
name: verify-v2-ship

on:
  push:
    tags:
      - "v*.*.*"
  # Manual re-run lane for the OPERATIONS §7.1 documented recovery flow.
  # When verify-v2-ship hits transient propagation lag (≤120s eventual
  # consistency) the maintainer runs `gh workflow run v2-release.yml --ref
  # <tag>` to retry. Three consecutive failures → §7.1 yank procedure.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to verify (e.g. v2.0.0)"
        required: true
        type: string

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Install vendored deps
        run: |
          PSUTIL_PIN=$(cat plugins/launchpad/scripts/_vendor/PSUTIL_VERSION)
          PYYAML_PIN=$(cat plugins/launchpad/scripts/_vendor/PYYAML_VERSION)
          python -m pip install --upgrade pip
          python -m pip install "psutil==${PSUTIL_PIN}" "pyyaml==${PYYAML_PIN}"

      - name: 0) Strict semver shape (in-job validation)
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          # GitHub tag filters are glob-only; in-job regex enforces the strict
          # `vMAJOR.MINOR.PATCH` shape. Suffix patterns (-yanked / -recalled /
          # -rc* / -dryrun) are intentionally rejected here, NOT at the trigger.
          # Source: GITHUB_REF for push events, inputs.tag for workflow_dispatch.
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${DISPATCH_TAG}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag $TAG is not strict semver (vMAJOR.MINOR.PATCH); refusing"
            exit 1
          fi
          echo "Tag $TAG passes strict semver gate"
          echo "RESOLVED_TAG=${TAG}" >> "$GITHUB_ENV"

      - name: 1) Tag SHA matches squash-merge HEAD on main
        run: |
          # The tag MUST point at a commit that is the current main HEAD
          # (or an ancestor reachable as the most recent squash-merge).
          # v2.0 simplification per HANDSHAKE §1.5: single-shot, no
          # exponential-backoff polling (BL-232 deferred). If the GitHub
          # API has propagation lag (≤120s eventual consistency), the
          # maintainer waits 2 minutes and re-runs via
          # `gh workflow run v2-release.yml --ref <tag>` per OPERATIONS
          # §7.1 documented fallback.
          TAG_SHA=$(git rev-list -n 1 "${RESOLVED_TAG}")
          MAIN_SHA=$(git rev-parse origin/main 2>/dev/null \
                       || git rev-parse main)
          if [ "$TAG_SHA" != "$MAIN_SHA" ]; then
            echo "::error::tag SHA $TAG_SHA does not match main HEAD $MAIN_SHA"
            echo "::error::see OPERATIONS §7.1 — wait 2 minutes and re-run"
            echo "::error::if three consecutive re-runs fail, escalate to yank"
            exit 1
          fi
          echo "tag SHA matches main HEAD: $TAG_SHA"

      - name: 2) plugin.json version matches tag
        run: |
          TAG_VERSION="${RESOLVED_TAG#v}"
          PLUGIN_VERSION=$(python -c "import json; print(json.load(open('plugins/launchpad/.claude-plugin/plugin.json'))['version'])")
          if [ "$TAG_VERSION" != "$PLUGIN_VERSION" ]; then
            echo "::error::tag version $TAG_VERSION != plugin.json version $PLUGIN_VERSION"
            exit 1
          fi
          echo "plugin.json version matches tag: $PLUGIN_VERSION"

      - name: 3) No pre-ship version residual in plugin-shipped tree
        run: |
          # Asserts the §10 post-bump invariant: the pre-ship version literal
          # must not appear in plugin-shipped trees. The HANDSHAKE.md + this
          # lint script + plan/handoff/release-notes docs are allowlisted
          # (they document the lifecycle string itself). User-tree carve-out
          # applies — user-generated .launchpad/scaffold-*.json files are
          # out of scope.
          python plugins/launchpad/scripts/plugin-v2-handshake-lint.py \
            --check-version-coherence --phase=post-tag

      - name: 4) No private-origin leakage regex match
        run: |
          # Patterns from PRIVATE_ORIGIN_PATTERNS + the
          # `# private-origin:` section of .launchpad/secret-patterns.txt.
          # Per Option A: marketplace.json + immutable v1.x history are
          # allowlisted via LEAKAGE_FILE_ALLOWLIST.
          python plugins/launchpad/scripts/plugin-v2-handshake-lint.py \
            --check-leakage

      - name: 5) Catalog integrity + catalog/pattern freshness (release-time)
        run: |
          # Validates the catalog/pattern SUBSET of the OPERATIONS §4 target set
          # (scaffolders.yml + category-patterns.yml + scaffolders/*-pattern.md):
          # schema shape, knowledge_anchor_sha256 pins, AND `last_validated:`
          # freshness as a HARD gate. The default PR lint treats that freshness
          # as advisory so a lapsed window never blocks an unrelated change
          # (e.g. a Dependabot bump); here at release it must be fresh. The FULL
          # §4 freshness contract — including pillar-framework.md and the
          # SCAFFOLD_HANDSHAKE/OPERATIONS contract docs — is enforced by step 6.
          python plugins/launchpad/scripts/plugin-v2-handshake-lint.py \
            --check-freshness

      - name: 6) Full OPERATIONS §4 freshness contract (release-time hard gate)
        run: |
          # OPERATIONS §4: every plugin-shipped catalog/pattern doc AND the
          # contract docs themselves must carry a `last_validated:` within the
          # 30d window at the tag commit. `plugin-freshness-check.py` is the
          # canonical checker — it owns the complete target list (scaffolders +
          # category-patterns + pillar-framework + SCAFFOLD_HANDSHAKE +
          # SCAFFOLD_OPERATIONS + *-pattern.md). It runs ADVISORY on every PR;
          # `--gating` promotes it to a hard exit-1-on-stale gate here at
          # release. If this fails, re-stamp the flagged docs to today and
          # re-tag (contract docs use their re-stamp-affirmation commit form).
          python plugins/launchpad/scripts/plugin-freshness-check.py --gating
