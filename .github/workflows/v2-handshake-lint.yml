# v2.0 handshake CI lint (OPERATIONS §2 + HANDSHAKE §12).
# Single PR-triggered workflow; minimum-privilege `contents: read` token.
# v1.x marketplace-lint and other workflows continue running unchanged on
# feature branches; this workflow is scoped to feat/v2-greenfield-pipeline.
name: v2-handshake-lint

on:
  pull_request:
    branches:
      - feat/v2-greenfield-pipeline
      - main

permissions:
  contents: read

jobs:
  v2-handshake-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Fetch full history so the schema-codeowners gate can compute
          # `git diff origin/main...HEAD`; default fetch-depth: 1 only
          # contains HEAD which makes the gate report "diff failed".
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install hash-pinned plugin runtime deps (v2.1+)
        # Single install path covers psutil, pyyaml, jinja2, markupsafe.
        # Hashes are verified via --require-hashes so a hostile PyPI
        # mirror or wheel cannot substitute a different artifact.
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r plugins/launchpad/scripts/requirements.txt

      - name: Run v2 handshake lint
        run: python plugins/launchpad/scripts/plugin-v2-handshake-lint.py

      # v2.1.1 Phase 4 — Layer 3 static analysis (DA-4.8). 6 step entries,
      # 4 logical tools (ruff split into check + format; semgrep split into
      # general + launchpad-internal). Required for parity with the lefthook
      # pre-commit + pre-push gates so CI catches what local hooks would.
      # Hash-pinned via plugins/launchpad/scripts/requirements.txt.

      - name: Ruff check (style + import order + bugbear)
        # 1 of 6: ruff lint check.
        run: ruff check --config plugins/launchpad/scripts/pyproject.toml plugins/launchpad/scripts/

      - name: Ruff format check (formatting consistency)
        # 2 of 6: ruff format-check.
        run: ruff format --check --config plugins/launchpad/scripts/pyproject.toml plugins/launchpad/scripts/

      - name: Pyright type-check
        # 3 of 6: pyright. Standard mode codebase-wide; strict on 3 contract
        # modules (decision_validator, nonce_ledger, decision_integrity)
        # via per-file `# pyright: strict` directive.
        working-directory: plugins/launchpad/scripts
        run: pyright

      - name: Bandit security audit (medium+ severity)
        # 4 of 6: bandit at MEDIUM+ matches local lefthook gate.
        run: bandit -r plugins/launchpad/scripts/ -x '_vendor,tests' -ll

      - name: Semgrep general patterns (R1-T1-X exit-code branching)
        # 5 of 6: 8 universal Python static-analysis patterns. Distinguish
        # exit 1 (rule fired) from exit 2+ (tool crashed/timed out).
        run: |
          set +e
          timeout 120 semgrep --config=plugins/launchpad/.semgrep/general.yml \
            plugins/launchpad/scripts/ --error --metrics=off
          ec=$?
          set -e
          if [ "$ec" -eq 0 ]; then echo "semgrep general: clean"; exit 0
          elif [ "$ec" -eq 1 ]; then echo "semgrep general: rule findings (exit 1)"; exit 1
          else echo "semgrep general: TOOL CRASH or TIMEOUT (exit $ec) — escalate"; exit "$ec"; fi

      - name: Semgrep launchpad-internal invariants (R1-T1-X exit-code branching)
        # 6 of 6: 4 LaunchPad-internal cross-cutting invariants
        # (atomic_io trusted_root + kernel SHA domain-tag + composition
        # backup rmtree + v2 module safe_run usage).
        run: |
          set +e
          timeout 120 semgrep --config=plugins/launchpad/.semgrep/launchpad-internal.yml \
            plugins/launchpad/scripts/ --error --metrics=off
          ec=$?
          set -e
          if [ "$ec" -eq 0 ]; then echo "semgrep launchpad-internal: clean"; exit 0
          elif [ "$ec" -eq 1 ]; then echo "semgrep launchpad-internal: invariant violation (exit 1)"; exit 1
          else echo "semgrep launchpad-internal: TOOL CRASH or TIMEOUT (exit $ec) — escalate"; exit "$ec"; fi

      - name: Schema-CODEOWNERS gate (v2.1+)
        # V3 plan §11.6 + §11.7 + HANDSHAKE §10.v2.1: schema-source code
        # changes MUST be paired with a SCAFFOLD_HANDSHAKE.md update in
        # the same PR. The gate uses `git diff origin/main...HEAD` so the
        # `fetch-depth: 0` checkout above is required.
        env:
          LP_BASE_REF: origin/${{ github.base_ref || 'main' }}
        run: python plugins/launchpad/scripts/plugin-v2-handshake-lint.py --check-schema-codeowners-gate

      - name: Run full v2 test suite
        # Run the FULL pytest suite under plugins/launchpad/scripts/. The
        # configured testpaths in pytest.ini cover both `tests/` and
        # `plugin_stack_adapters/tests/` — invoking pytest with no
        # positional path picks up both (PR #41 cycle 6 #2 closure: the
        # previous `tests/` argument silently excluded the StackId widening
        # acceptance test). The previous narrow subset also masked the
        # parents[3]→plugins/ default-paths bug because every test passed
        # explicit override paths (cycle 4 #5 closure). If the full suite
        # cost grows beyond 60s, partition with pytest-xdist instead of
        # returning to a subset.
        working-directory: plugins/launchpad/scripts
        run: python -m pytest -q

      - name: Default catalog paths smoke check
        # Direct assertion that DEFAULT_SCAFFOLDERS_YML +
        # DEFAULT_CATEGORY_PATTERNS_YML resolve to existing files when the
        # engine module is imported with no overrides — guards against the
        # parents[N] off-by-one bug recurring (cycle 4 #1 regression pin).
        working-directory: plugins/launchpad/scripts
        run: |
          python -c "import sys; sys.path.insert(0, '.'); \
            from lp_scaffold_stack.engine import DEFAULT_SCAFFOLDERS_YML, DEFAULT_CATEGORY_PATTERNS_YML; \
            assert DEFAULT_SCAFFOLDERS_YML.is_file(), f'DEFAULT_SCAFFOLDERS_YML does not exist: {DEFAULT_SCAFFOLDERS_YML}'; \
            assert DEFAULT_CATEGORY_PATTERNS_YML.is_file(), f'DEFAULT_CATEGORY_PATTERNS_YML does not exist: {DEFAULT_CATEGORY_PATTERNS_YML}'; \
            print('default catalog paths exist')"

      - name: Freshness advisory
        run: python plugins/launchpad/scripts/plugin-freshness-check.py

      - name: Backlog orphan check
        # Slip-prevention gate added 2026-05-07 after BL-236 (lefthook
        # Python coverage) was discovered post-hoc to have been labeled
        # for v2.1 in BACKLOG.md but never implemented or deferred. The
        # script reads the running plugin version from plugin.json,
        # then asserts every `BL-N - vX.Y.Z` header in BACKLOG.md
        # labeled for that release has either a `**Status**:` close
        # marker (shipped/closed/re-targeted/deferred/superseded) or a
        # `BL-N` reference inside the matching `## [version]` block of
        # CHANGELOG.md. Skips silently if no matching CHANGELOG block
        # exists yet (e.g., pre-tag development cycles).
        run: |
          version=$(python -c "import json; print(json.load(open('plugins/launchpad/.claude-plugin/plugin.json'))['version'])")
          if grep -qE "^## \[v?$version\]" CHANGELOG.md; then
            python plugins/launchpad/scripts/plugin-backlog-orphan-check.py --release "$version"
          else
            echo "backlog-orphan-check: skipped (no [$version] or [v$version] block in CHANGELOG.md yet)"
          fi

      - name: Upstream pin walk-scope parity check (v2.1.4 BL-328)
        # Pin-rotation-time symlink/disallowed-entry parity check.
        # Catches the BL-328 class of bug at PR time (Astro/marketing
        # pin shipped with test-fixture symlinks under packages/) by
        # cloning each pinned upstream SHA and walking the SUBTREE the
        # adapter actually copies (per `_SUB_PATHS` for sub-template
        # adapters; whole-tree for others). Uses `--offline-skip` so
        # ephemeral runners that can't reach github.com don't fail
        # the build (the local pre-push lefthook hook is the
        # always-available fallback, configured separately).
        # v2.1.4 Codex P2 (round 5): cap the step at 10 minutes so a
        # continuous network outage cannot stall CI for the full
        # 5-pin × 600s/pin = 50min worst case. `--offline-skip`
        # converts the timeout-failure exit code into a clean SKIP
        # at the next runner run.
        timeout-minutes: 10
        run: |
          python plugins/launchpad/scripts/plugin-upstream-pin-walk-scope-parity.py --offline-skip
