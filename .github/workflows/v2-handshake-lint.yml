# v2.0 handshake CI lint (OPERATIONS §2 + HANDSHAKE §12).
# Single PR-triggered workflow; minimum-privilege `contents: read` token.
# v1.x marketplace-lint and other workflows continue running unchanged on
# feature branches; this workflow is scoped to feat/v2-greenfield-pipeline.
name: v2-handshake-lint

on:
  pull_request:
    branches:
      - feat/v2-greenfield-pipeline
      - main

permissions:
  contents: read

jobs:
  v2-handshake-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install psutil (vendored pin reference)
        run: |
          PIN=$(cat plugins/launchpad/scripts/_vendor/PSUTIL_VERSION)
          python -m pip install --upgrade pip
          python -m pip install "psutil==${PIN}"

      - name: Install pytest
        run: python -m pip install pytest

      - name: Run v2 handshake lint
        run: python plugins/launchpad/scripts/plugin-v2-handshake-lint.py

      - name: Run unit tests for v2 modules
        working-directory: plugins/launchpad/scripts
        run: |
          python -m pytest \
            tests/test_decision_integrity.py \
            tests/test_path_validator.py \
            tests/test_cwd_state.py \
            tests/test_brownfield_manifests_single_source.py \
            tests/test_safe_run.py \
            tests/test_telemetry_writer.py \
            tests/test_knowledge_anchor_loader.py \
            tests/test_valid_combinations.py \
            tests/test_rationale_summary_extractor.py \
            tests/test_pid_identity.py \
            -v

      - name: Freshness advisory
        run: python plugins/launchpad/scripts/plugin-freshness-check.py
