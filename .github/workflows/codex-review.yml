name: Codex Code Review

on:
  pull_request:
    # `edited` is included so that toggling the `[skip codex]` token in
    # the PR title (see `if:` block below) re-evaluates the gate without
    # requiring a new commit. Without it, a maintainer removing the
    # token from the title to re-enable Codex on the final PR state
    # would have to push an empty commit to trigger a re-run.
    types: [opened, synchronize, ready_for_review, edited]

permissions:
  contents: read
  pull-requests: write

jobs:
  codex-review:
    name: Codex Code Review
    runs-on: ubuntu-latest
    continue-on-error: true
    # v2.1.4 BL-332: cap the whole job at 20 minutes. Historical max for
    # the `Run Codex Review` step on this repo is ~3-4 minutes; 20
    # minutes is a generous ceiling that fails fast on OpenAI-side
    # hangs without false-positives on legitimately-long reviews
    # (large-diff PRs, prompt complexity). Surfaced 2026-05-15 when
    # the codex-action hung for ~6 hours on PR #67 before manual
    # cancel; without this cap, GitHub's 360-minute job default would
    # re-burn 6h on every future Codex outage. The belt-and-suspenders
    # inner-step `timeout-minutes: 18` below provides a cleaner cancel
    # signal (the action's exit handler runs) before this job-level
    # kill fires; the per-step cap MUST be lower than this job-level
    # cap.
    timeout-minutes: 20
    # Skip draft PRs, dependabot, AND PRs whose title contains the
    # `[skip codex]` token. The token lets maintainers opt out of Codex
    # review (which is paid per-run via OPENAI_API_KEY) for small
    # follow-up commits where the cost outweighs the value. Toggle the
    # token on/off via `gh pr edit <number> --title "<new title>"`;
    # remove the token before merge if you want Codex to fire on the
    # final state.
    # Check the PR author (`pull_request.user.login`) rather than
    # `github.actor`. On `pull_request.edited` events, `github.actor` is
    # whoever edited the title/body — for a maintainer-edited Dependabot
    # PR that would be the maintainer, not Dependabot, and the skip
    # would no longer apply. The PR author is stable across all event
    # types.
    if: |
      !github.event.pull_request.draft &&
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      !contains(github.event.pull_request.title, '[skip codex]')

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      # Ubuntu 24.04+ blocks unprivileged user namespaces via AppArmor, which
      # prevents Codex's vendored bubblewrap (bwrap) from setting up its sandbox.
      # This relaxation is scoped to this ephemeral runner job only.
      # TODO: Consider gating to non-fork PRs for additional hardening.
      - name: Relax AppArmor for Codex sandbox (Ubuntu 24.04+)
        run: |
          if [ -f /proc/sys/kernel/apparmor_restrict_unprivileged_userns ]; then
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          fi

      - name: Pre-fetch base and head refs
        run: |
          git fetch --no-tags origin \
            ${{ github.event.pull_request.base.ref }} \
            +refs/pull/${{ github.event.pull_request.number }}/head

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: |
            # TypeScript / JavaScript source code
            **/*.ts
            **/*.tsx
            **/*.js
            **/*.jsx
            **/*.mjs
            **/*.cjs
            # Infrastructure
            **/*.prisma
            **/*.sql
            **/*.sh
            **/Dockerfile
            # Config & dependency manifests
            **/*.json
            **/*.toml
            **/*.yml
            **/*.yaml
            # CI/CD workflows
            .github/workflows/**/*.yml
          files_ignore: |
            # Test files
            **/*.test.ts
            **/*.test.tsx
            **/*.spec.ts
            **/*.spec.tsx
            # Build artifacts & dependencies
            **/node_modules/**
            **/.next/**
            **/dist/**
            **/.turbo/**
            # Lock files (auto-generated)
            **/pnpm-lock.yaml
            **/package-lock.json
            # Generated files
            **/*.d.ts
            **/prisma/migrations/**/*.sql

      - name: Run Codex Review
        id: codex-review
        if: steps.changed-files.outputs.any_changed == 'true'
        # v2.1.4 BL-332 belt-and-suspenders: cap the action itself at
        # 18 minutes so the action's own exit handler runs before the
        # job-level 20-minute kill. Per-step cap MUST stay lower than
        # the job-level cap or it has no effect. Pair with
        # `continue-on-error: true` on the job means a timeout failure
        # never blocks merge.
        timeout-minutes: 18
        uses: openai/codex-action@e0fdf01220eb9a88167c4898839d273e3f2609d1 # v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex-review-prompt.md
          sandbox: read-only
          safety-strategy: drop-sudo

      - name: Post Review Comment
        if: steps.changed-files.outputs.any_changed == 'true' && steps.codex-review.outcome == 'success'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          REVIEW_OUTPUT: ${{ steps.codex-review.outputs.final-message }}
        with:
          script: |
            const reviewContent = process.env.REVIEW_OUTPUT || 'No issues found.';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Codex Automated Code Review\n\n${reviewContent}\n\n---\n*Automated review by [OpenAI Codex](https://openai.com/codex/)*`
            });

      - name: Review skipped
        if: steps.changed-files.outputs.any_changed == 'true' && steps.codex-review.outcome != 'success'
        run: |
          echo "::warning::Codex review step did not succeed (outcome: ${{ steps.codex-review.outcome }}). Review comment was not posted."

      - name: Skip notification
        if: steps.changed-files.outputs.any_changed != 'true'
        run: echo "No reviewable files changed, skipping Codex review"
