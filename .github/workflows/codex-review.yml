name: Codex Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  codex-review:
    name: Codex Code Review
    runs-on: ubuntu-latest
    continue-on-error: true
    # Skip draft PRs and dependabot
    if: |
      !github.event.pull_request.draft &&
      github.actor != 'dependabot[bot]'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            # TypeScript / JavaScript source code
            **/*.ts
            **/*.tsx
            **/*.js
            **/*.jsx
            **/*.mjs
            **/*.cjs
            # Infrastructure
            **/*.prisma
            **/*.sql
            **/*.sh
            **/Dockerfile
            # Config & dependency manifests
            **/*.json
            **/*.toml
            **/*.yml
            **/*.yaml
            # CI/CD workflows
            .github/workflows/**/*.yml
          files_ignore: |
            # Test files
            **/*.test.ts
            **/*.test.tsx
            **/*.spec.ts
            **/*.spec.tsx
            # Build artifacts & dependencies
            **/node_modules/**
            **/.next/**
            **/dist/**
            **/.turbo/**
            # Lock files (auto-generated)
            **/pnpm-lock.yaml
            **/package-lock.json
            # Generated files
            **/*.d.ts
            **/prisma/migrations/**/*.sql

      - name: Run Codex Review
        id: codex-review
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex-review-prompt.md
          model: gpt-5.2
          sandbox: read-only
          safety-strategy: drop-sudo

      - name: Post Review Comment
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            let reviewContent = '';
            try {
              reviewContent = '${{ steps.codex-review.outputs.final-message }}' || 'No issues found.';
            } catch (e) {
              reviewContent = 'Codex review completed. Check workflow logs for details.';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Codex Automated Code Review\n\n${reviewContent}\n\n---\n*Automated review by [OpenAI Codex](https://openai.com/codex/)*`
            });

      - name: Skip notification
        if: steps.changed-files.outputs.any_changed != 'true'
        run: echo "No reviewable files changed, skipping Codex review"
