name: Release Notes Check

# Enforces that every release PR and tag push includes a hand-authored
# docs/releases/v<VERSION>.md file. See docs/maintainers/RELEASE_PROCESS.md
# for the why and the full release process.
#
# This workflow is LaunchPad-internal only. v0/v1 init-project.sh used to
# strip it from downstream projects scaffolded via the LaunchPad template;
# v2.1 decommissioned that flow (BL-247). Downstream projects scaffolded by
# the v2.x kernel renderer never receive this workflow, so no strip step is
# needed. The per-version release-notes-file convention is a maintainer
# choice, not something we impose on downstream projects whose release
# practices we cannot predict.

on:
  pull_request:
    branches: [main]
  push:
    tags: ["v*.*.*"]

jobs:
  check:
    name: Verify release notes file exists
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Resolve version and check file
        run: |
          set -euo pipefail

          # Determine version from event context
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            CONTEXT="tag push (${VERSION})"
          else
            BRANCH="${GITHUB_HEAD_REF}"
            # Anchor the version match: it must appear immediately after the
            # branch type prefix (chore/, release/, fix/, etc.) — i.e. as
            # `<type>/vX.Y.Z` or `<type>/vX.Y.Z-<summary>`. This avoids false
            # positives on branches that mention a library version in their
            # name (e.g. fix/pin-hono-v4.12.15 — the v4.12.15 there refers to
            # hono, not a LaunchPad release). The release-process doc
            # (docs/maintainers/RELEASE_PROCESS.md) prescribes the
            # `<type>/vX.Y.Z-<summary>` convention this regex enforces.
            if [[ "${BRANCH}" =~ ^[a-z]+/v([0-9]+\.[0-9]+\.[0-9]+)([\-/]|$) ]]; then
              VERSION="v${BASH_REMATCH[1]}"
              CONTEXT="PR branch ${BRANCH} (inferred ${VERSION})"
            else
              echo "::notice::Branch '${BRANCH}' does not match a release-branch pattern (^[a-z]+/vX.Y.Z[-/$]). Skipping release-notes check."
              exit 0
            fi
          fi

          NOTES_FILE="docs/releases/${VERSION}.md"

          if [[ ! -f "${NOTES_FILE}" ]]; then
            echo "::error file=${NOTES_FILE}::Release notes file ${NOTES_FILE} is missing."
            echo "::error::Context: ${CONTEXT}"
            echo "::error::This repo follows the per-version release-notes-file convention."
            echo "::error::Add docs/releases/${VERSION}.md to this PR (or amend the tagged commit) before merging/tagging."
            echo "::error::See docs/maintainers/RELEASE_PROCESS.md for the full release process."
            exit 1
          fi

          # Sanity-check the file isn't empty / placeholder
          if ! grep -qE '^# ' "${NOTES_FILE}"; then
            echo "::error file=${NOTES_FILE}::Release notes file exists but appears to lack a top-level heading. Confirm it is hand-authored content, not a placeholder."
            exit 1
          fi

          echo "::notice::Release notes file ${NOTES_FILE} exists and is non-empty. ✓"

      - name: v2.1 co-ship invariant (Phase 8 / 8.5 / 9)
        if: ${{ startsWith(github.ref, 'refs/tags/v2.1.') }}
        env:
          TAG_VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Per Phase 8 plan §3.7: tag pushes for v2.1.* must NOT land if the
          # decommission audit log carries Phase-8 or Phase-8.5 entries that
          # are not yet announced in CHANGELOG.md (the user-facing surface).
          # This prevents accidental tagging of a partial decommission state
          # where the source tree removes the v0/v1 install path but the
          # release notes / CHANGELOG fail to communicate it to users.

          AUDIT_LOG="docs/maintainers/decommission-history.md"
          CHANGELOG="CHANGELOG.md"

          if [[ ! -f "${AUDIT_LOG}" ]]; then
            echo "::error file=${AUDIT_LOG}::Decommission audit log is missing for a v2.1.* tag push."
            exit 1
          fi
          if [[ ! -f "${CHANGELOG}" ]]; then
            echo "::error file=${CHANGELOG}::CHANGELOG.md is missing for a v2.1.* tag push."
            exit 1
          fi

          # Phase-8 + Phase-8.5 entries must be announced under a v2.1.* heading
          # in CHANGELOG.md. The heading regex matches Keep-a-Changelog convention:
          # ## [v2.1.0] - YYYY-MM-DD or ## v2.1.0 - YYYY-MM-DD.
          if grep -qE '^\| [0-9-]+ \| .* \| BL-247 \| 8(\.5)? \|' "${AUDIT_LOG}"; then
            if ! grep -qE '^## (\[)?v2\.1\.[0-9]+(\])?' "${CHANGELOG}"; then
              echo "::error file=${CHANGELOG}::Phase-8 or Phase-8.5 audit-log entries exist but no v2.1.* CHANGELOG heading found. Co-ship invariant violated; release notes must announce decommissions before tagging."
              echo "::error::Audit log: ${AUDIT_LOG}"
              echo "::error::Add a 'v2.1.*' heading to CHANGELOG.md describing the BL-247 + BL-248 decommissions before pushing the tag."
              exit 1
            fi
          fi

          echo "::notice::v2.1 co-ship invariant satisfied for ${TAG_VERSION}. ✓"
