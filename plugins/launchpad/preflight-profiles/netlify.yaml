# Netlify deployment preflight profile.
#
# Covers: account existence, API token validity, site existence, GitHub
# Secrets population.
#
# Required env vars:
#   - NETLIFY_AUTH_TOKEN
#   - NETLIFY_SITE_ID

name: netlify
description: Netlify deploy prerequisites

checks:
  - id: netlify.account-exists
    category: C2
    title: Netlify account exists at app.netlify.com
    setup_hint: |
      Sign up at https://app.netlify.com/signup. GitHub OAuth is the
      most direct path for imports.
    stale_window_days: 365

  - id: netlify.api-token-valid
    category: B
    title: NETLIFY_AUTH_TOKEN is set and valid
    setup_hint: |
      1. Visit https://app.netlify.com/user/applications.
      2. Click "New access token", give it a description, copy the
         token (Netlify shows it once).
      3. Export in your shell: `export NETLIFY_AUTH_TOKEN=...`. Preflight
         reads from process environment only; if you keep tokens in `.env`,
         source the file before invoking `/lp-preflight` / `/lp-build` /
         `/lp-ship`.
    stale_window_days: 60
    probe: netlify-api-token-valid
    args:
      token_env: NETLIFY_AUTH_TOKEN

  - id: netlify.site-exists
    category: C1
    title: Netlify site exists and is linked to the GitHub repo
    setup_hint: |
      1. Visit https://app.netlify.com and click "Add new site" ->
         "Import an existing project".
      2. Connect GitHub, select the repo, configure build command +
         publish dir per your stack.
      3. After creation, find the site id in Site Settings -> General
         (the UUID under "Site information"). Set NETLIFY_SITE_ID.
    stale_window_days: 90
    probe: netlify-site-exists
    args:
      token_env: NETLIFY_AUTH_TOKEN
      site_env: NETLIFY_SITE_ID

  - id: netlify.github-secrets-populated
    category: C1
    title: GitHub Secrets NETLIFY_AUTH_TOKEN + NETLIFY_SITE_ID are set
    setup_hint: |
      1. Visit https://github.com/<owner>/<repo>/settings/secrets/actions.
      2. Add NETLIFY_AUTH_TOKEN.
      3. Add NETLIFY_SITE_ID.
    stale_window_days: 60
    probe: github-secrets-populated
    args:
      required_secrets:
        - NETLIFY_AUTH_TOKEN
        - NETLIFY_SITE_ID
