# LaunchPad v2.1.1 Phase 4 — universal Python static-analysis patterns.
#
# 8 rules per DA-4.6 + R1-T1-17 expansion. Rule shapes track the plan's
# canonical form; sibling-iterated for FP/FN minimization at Slice 7 step 5.
# Self-host only at v2.1.1; downstream emission is v2.1.x BL (DA-4.10).

rules:
  - id: subprocess-shell-true-without-allowlist
    message: |
      subprocess.run/Popen with shell=True is dangerous outside allowlisted callers.
      Use safe_run() or safe_run_long_shell() with an explicit env allowlist.
    severity: ERROR
    languages: [python]
    pattern: subprocess.$FN(..., shell=True, ...)
    paths:
      exclude:
        - "**/_vendor/**"
        - "**/tests/**"
        - "**/*.j2"
        # LINT_SHELL_TRUE_ALLOWLIST mirror (plugin-v2-handshake-lint.py:147+)
        - "plugins/launchpad/scripts/safe_run.py"
        - "plugins/launchpad/scripts/plugin-build-runner.py"

  - id: path-traversal-via-relative-join
    message: |
      Path joins on user-supplied input without validation may permit traversal.
      Use atomic_io._assert_path_safe(target, trusted_root=...) before write.
    # Sibling Slice 7 iteration: original `Path(...) / $USER_INPUT` pattern
    # produced ~5 FPs on benign internal Path iteration (e.g.,
    # `Path(dirpath) / name` in os.walk loops). Tightened to require
    # variable-name shapes that suggest external/user input. Still permissive
    # — v2.1.x BL: replace with semgrep `taint` mode tracking sources/sinks.
    severity: WARNING
    languages: [python]
    pattern-either:
      - pattern: open(... + $USER_INPUT, ...)
    paths:
      exclude:
        - "**/_vendor/**"
        - "**/tests/**"

  - id: weak-hash-for-security
    message: |
      MD5 and SHA1 are unsuitable for security purposes (collision attacks).
      Use SHA256 or stronger; or annotate intent (e.g., cache-key, non-security).
    severity: WARNING
    languages: [python]
    pattern-either:
      - pattern: hashlib.md5(...)
      - pattern: hashlib.sha1(...)
    paths:
      exclude:
        - "**/_vendor/**"
        - "**/tests/**"

  - id: hardcoded-api-key-pattern
    message: |
      Possible hardcoded API key / token. Use environment variable.
    severity: ERROR
    languages: [python]
    pattern-regex: '(?i)(api[_-]?key|token|secret)\s*=\s*["\x27][A-Za-z0-9_\-]{20,}["\x27]'
    paths:
      exclude:
        - "**/_vendor/**"
        - "**/tests/**"
        - "**/.semgrep/**"

  - id: file-write-without-trusted-root
    message: |
      atomic_io.atomic_write_excl/replace/replace_batch callers MUST pass
      trusted_root= keyword (HANDSHAKE §6 + cycle-3 P0 closure).
    severity: ERROR
    languages: [python]
    pattern-either:
      - pattern: atomic_io.atomic_write_excl($TARGET, $DATA)
      - pattern: atomic_io.atomic_write_replace($TARGET, $DATA)
      - pattern: atomic_io.atomic_write_replace_batch($PAIRS)
    pattern-not-either:
      - pattern: atomic_io.atomic_write_excl(..., trusted_root=...)
      - pattern: atomic_io.atomic_write_replace(..., trusted_root=...)
      - pattern: atomic_io.atomic_write_replace_batch(..., trusted_root=...)
    paths:
      include:
        - "plugins/launchpad/scripts/**/*.py"
      exclude:
        - "**/_vendor/**"
        - "**/tests/**"

  # R1-T1-17 + R2-T1-12 (sec-lens P1-A): yaml.load MUST use SafeLoader variant.
  - id: yaml-load-without-safe-loader
    message: |
      yaml.load(...) MUST pass a SafeLoader variant. Default Loader allows
      arbitrary object instantiation (CWE-502). Acceptable Loaders: SafeLoader,
      CSafeLoader, or any binding/alias resolving to one of those (verified
      by reading the import or the upstream binding at the call site).
    severity: ERROR
    languages: [python]
    pattern-either:
      - pattern: yaml.load($STREAM)
      - pattern: yaml.load($STREAM, $LOADER)
    pattern-not-either:
      - pattern: yaml.load(..., Loader=yaml.SafeLoader)
      - pattern: yaml.load(..., Loader=yaml.CSafeLoader)
      - pattern: yaml.load(..., Loader=_SafeLoader)
      - pattern: yaml.load(..., Loader=SafeLoader)
      - pattern: yaml.load(..., Loader=CSafeLoader)
      - pattern: yaml.load($STREAM, yaml.SafeLoader)
      - pattern: yaml.load($STREAM, yaml.CSafeLoader)
      - pattern: yaml.load($STREAM, _SafeLoader)
      - pattern: yaml.load($STREAM, SafeLoader)
      - pattern: yaml.load($STREAM, CSafeLoader)
    paths:
      exclude:
        - "**/_vendor/**"
        - "**/tests/**"

  # R1-T1-17 + R2-T1-12 (sec-lens P1-B): unsafe deserialization.
  - id: unsafe-deserialization
    message: |
      pickle / marshal / shelve / dill load/loads execute arbitrary code
      on deserialization. Use json or a structured serializer for any
      non-trusted input.
    severity: ERROR
    languages: [python]
    pattern-either:
      - pattern: pickle.load(...)
      - pattern: pickle.loads(...)
      - pattern: marshal.load(...)
      - pattern: marshal.loads(...)
      - pattern: shelve.open(...)
      - pattern: dill.load(...)
      - pattern: dill.loads(...)
    paths:
      exclude:
        - "**/_vendor/**"
        - "**/tests/**"

  # R1-T1-17 + R2-T1-12 (sec-lens P1-C): archive extraction Zip-Slip / TarSlip.
  - id: archive-extractall-without-member-validation
    message: |
      tarfile / zipfile extractall without explicit member validation enables
      Zip-Slip / TarSlip path-traversal (CVE-2007-4559 class). For tarfile,
      pass filter='data' (Python 3.12+); for zipfile, pre-validate each
      member's path against the extraction root.
    severity: ERROR
    languages: [python]
    pattern-either:
      - patterns:
          - pattern: tarfile.open(...).extractall(...)
          - pattern-not: tarfile.open(...).extractall(..., filter=...)
      - patterns:
          - pattern: zipfile.ZipFile(...).extractall(...)
    paths:
      exclude:
        - "**/_vendor/**"
        - "**/tests/**"
