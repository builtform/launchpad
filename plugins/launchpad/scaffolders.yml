# LaunchPad v2.0 stack catalog (10 entries)
#
# Per HANDSHAKE §11 (10-entry v2.0 catalog) + HANDSHAKE §10 (schema_version
# field registered in lifecycle bump list). Each entry pairs a stack-id with
# its scaffolder command, knowledge-anchor doc + sha256, options schema, and
# the date its flag set + version pin was last verified.
#
# Per HANDSHAKE §1.5 strip-back: 10 stacks are deferred to v2.2 (BL-100/101/
# 102/103/104 + BL-212). DO NOT add cf-workers, tauri, nestjs, laravel, vite,
# sveltekit, elysia, phoenix-liveview, convex, flutter at v2.0.
#
# CODEOWNERS-gated per OPERATIONS §2 — this file requires the v2-handshake-
# approvers set (the BROWNFIELD_MANIFESTS analog: a malicious PR adding a
# stack entry could pivot the scaffolder to run an attacker-chosen command).
#
# Schema (per-entry):
#   pillar:                 string from HANDSHAKE §11 pillar column
#   type:                   "orchestrate" | "curate"
#   flavor:                 "pure-headless" | "mixed-prompts" | "n/a"
#   command:                scaffolder command (omit for curate)
#   headless_flags:         array of flags appended for non-interactive mode
#   knowledge_anchor:       relative path to <stack>-pattern.md
#   knowledge_anchor_sha256: sha256 hex of the anchor file's bytes
#   options_schema:         allowlisted option keys per HANDSHAKE §4 rule 2
#   last_validated:         YYYY-MM-DD; ≤30 days from today per OPERATIONS §4
schema_version: "1.0"

