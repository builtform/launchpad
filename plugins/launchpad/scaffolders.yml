# LaunchPad v2.0 stack catalog (10 entries)
#
# Per HANDSHAKE §11 (10-entry v2.0 catalog) + HANDSHAKE §10 (schema_version
# field registered in lifecycle bump list). Each entry pairs a stack-id with
# its scaffolder command, knowledge-anchor doc + sha256, options schema, and
# the date its flag set + version pin was last verified.
#
# Per HANDSHAKE §1.5 strip-back: 10 stacks are deferred to v2.2 (BL-100/101/
# 102/103/104 + BL-212). DO NOT add cf-workers, tauri, nestjs, laravel, vite,
# sveltekit, elysia, phoenix-liveview, convex, flutter at v2.0.
#
# CODEOWNERS-gated per OPERATIONS §2 — this file requires the v2-handshake-
# approvers set (the BROWNFIELD_MANIFESTS analog: a malicious PR adding a
# stack entry could pivot the scaffolder to run an attacker-chosen command).
#
# Schema (per-entry):
#   pillar:                 string from HANDSHAKE §11 pillar column
#   type:                   "orchestrate" | "curate"
#   flavor:                 "pure-headless" | "mixed-prompts" | "n/a"
#   command:                scaffolder command (omit for curate)
#   destination_argv:       per-stack positional argv inserted between
#                           `command` and `headless_flags`. Most modern CLIs
#                           accept `["."]` to scaffold into the current dir;
#                           `[]` for CLIs that scaffold-in-place by default
#                           (e.g. supabase init). django requires a project
#                           name (TODO BL-238 v2.1 — auto-derive from cwd).
#   headless_flags:         array of flags appended for non-interactive mode
#   knowledge_anchor:       relative path to <stack>-pattern.md
#   knowledge_anchor_sha256: sha256 hex of the anchor file's bytes
#   options_schema:         allowlisted option keys per HANDSHAKE §4 rule 2
#   last_validated:         YYYY-MM-DD; ≤30 days from today per OPERATIONS §4
schema_version: "1.0"

stacks:
  astro:
    pillar: "Frontend Content/Performance"
    type: "orchestrate"
    flavor: "pure-headless"
    command: "npm create astro@latest"
    destination_argv: ["."]
    # `--template` is a value-taking flag emitted via options_schema
    # (--template=<value>); listing it bare in headless_flags would consume
    # the next arg as its value and break the parser.
    headless_flags: ["--", "--yes"]
    knowledge_anchor: "plugins/launchpad/scaffolders/astro-pattern.md"
    knowledge_anchor_sha256: "dd253516d1064e0715d75b99f45400f35d1582208e7c246f15d3f3799a1875d4"
    options_schema:
      template: "string"
    last_validated: "2026-06-23"

  next:
    pillar: "Frontend App"
    type: "orchestrate"
    flavor: "pure-headless"
    command: "npx create-next-app@latest"
    destination_argv: ["."]
    headless_flags: ["--yes", "--typescript", "--eslint", "--tailwind", "--app", "--turbopack"]
    knowledge_anchor: "plugins/launchpad/scaffolders/next-pattern.md"
    knowledge_anchor_sha256: "3dce89abd01671bdc7ce3d7a62dac50176af1a5b6759eb795ecb5b8a2a3633ca"
    # Per v2.0.1 BL-244 #2 (PR #41 cycle-12 #2 closure): `src_dir` requires
    # the `--src-dir` kebab-case spelling that `create-next-app` expects;
    # without the option_flags override, layer_materializer would emit
    # `--src_dir` and create-next-app would error on the unknown flag.
    # `app_router` was previously listed here too but the App Router is
    # already forced via `--app` in headless_flags above; the option was
    # unreachable AND produced invalid argv when set. Dropped from the
    # schema entirely.
    option_flags:
      src_dir: "--src-dir"
    options_schema:
      src_dir: "boolean"
    last_validated: "2026-06-23"

  eleventy:
    pillar: "Frontend Content"
    type: "curate"
    flavor: "n/a"
    knowledge_anchor: "plugins/launchpad/scaffolders/eleventy-pattern.md"
    knowledge_anchor_sha256: "f5eda31b08b1e32c255e281d63e3ec640461f4aac2f8b4de25c7e8bd11757a31"
    options_schema:
      template_engine: "string"
    last_validated: "2026-06-23"

  hugo:
    pillar: "Frontend Content (Go)"
    type: "orchestrate"
    flavor: "pure-headless"
    command: "hugo new site"
    destination_argv: ["."]
    headless_flags: ["--force"]
    knowledge_anchor: "plugins/launchpad/scaffolders/hugo-pattern.md"
    knowledge_anchor_sha256: "3a607a46fa7c69f8fb9db0b140d325aeba1c921ebef85059dc8d6cf64800e249"
    options_schema:
      theme: "string"
    last_validated: "2026-06-23"

  hono:
    pillar: "Backend Edge-native TS"
    type: "orchestrate"
    flavor: "pure-headless"
    command: "npm create hono@latest"
    destination_argv: ["."]
    # `--template` is value-taking — emitted via options_schema, not bare.
    headless_flags: ["--", "--yes"]
    knowledge_anchor: "plugins/launchpad/scaffolders/hono-pattern.md"
    knowledge_anchor_sha256: "497afa81ca697748293d777417fce397d8f617928cd0e214c4bb9c35a58b6040"
    options_schema:
      template: "string"
    last_validated: "2026-06-23"

  fastapi:
    pillar: "Backend Python"
    type: "curate"
    flavor: "n/a"
    knowledge_anchor: "plugins/launchpad/scaffolders/fastapi-pattern.md"
    knowledge_anchor_sha256: "77787ef06954653a0ade6459a6e20a974c2a7aab07c3a7af0855c4cf67f9abb8"
    options_schema:
      database: "string"
    last_validated: "2026-06-23"

  django:
    pillar: "Backend Python"
    # type: curate (NOT orchestrate) at v2.0 — django-admin startproject
    # requires a positional project name (Python identifier) for which cwd-
    # basename auto-derivation + identifier sanitization is BL-238 v2.2 work.
    # Until BL-238 ships, the user follows the pattern doc to run django-admin
    # manually. Matches the eleventy + fastapi shape (curate scaffolders that
    # ship a knowledge_anchor + options_schema only).
    type: "curate"
    flavor: "n/a"
    knowledge_anchor: "plugins/launchpad/scaffolders/django-pattern.md"
    knowledge_anchor_sha256: "a5f837026074d54aa09e13273a6f313135de7c0aa92036f1a6beb92ea6d6505c"
    options_schema:
      database: "string"
    last_validated: "2026-06-23"

  rails:
    pillar: "Backend MVC (Ruby)"
    type: "orchestrate"
    flavor: "pure-headless"
    command: "rails new"
    destination_argv: ["."]
    headless_flags: ["--skip-bundle", "--skip-git"]
    knowledge_anchor: "plugins/launchpad/scaffolders/rails-pattern.md"
    knowledge_anchor_sha256: "cd666d0f5f5f1f99497924fbaa38074e4611a0b9f35056829bcdf62630525301"
    options_schema:
      database: "string"
      javascript: "string"
    last_validated: "2026-06-23"

  supabase:
    pillar: "Backend Managed"
    # type: curate (NOT orchestrate) at v2.0 — `supabase init` is mixed-
    # prompts with no non-interactive flag set, so headless invocation
    # would hang on stdin until the 5-minute timeout. Demoted to curate
    # so users follow the pattern doc and run `supabase init` themselves.
    # Future v2.1+ work: identify a verified non-interactive invocation
    # path (env vars + --yes equivalent) and promote back to orchestrate.
    type: "curate"
    flavor: "n/a"
    knowledge_anchor: "plugins/launchpad/scaffolders/supabase-pattern.md"
    knowledge_anchor_sha256: "0f93655539befdfcc024bcf905e49d090f11d0b424798cb79cf7ab342786c4e2"
    options_schema:
      vscode_deno_settings: "boolean"
      intellij_deno_settings: "boolean"
    last_validated: "2026-06-23"

  expo:
    pillar: "Frontend Mobile (RN)"
    type: "orchestrate"
    flavor: "pure-headless"
    command: "npx create-expo-app@latest"
    destination_argv: ["."]
    # `--template` is value-taking — emitted via options_schema, not bare.
    headless_flags: ["--yes"]
    knowledge_anchor: "plugins/launchpad/scaffolders/expo-pattern.md"
    knowledge_anchor_sha256: "b7b19ca0fda81fcab9594204c27c160f6698ac4e0b1955647549dd401875bf25"
    options_schema:
      template: "string"
    last_validated: "2026-06-23"

  # v2.1.4 BL-331: `generic` selectable as a primary stack — barebones
  # workspace shell, bring-your-own-framework path. No scaffolder command
  # (type=curate) — the user wires their own framework over the
  # cross-cutting wiring LaunchPad provides (lefthook, agents.yml,
  # config.yml, CI). Distinct from the v2.2-candidate fallback path
  # which signals "stack-aware adapter not yet ready"; picking generic
  # directly is positive intent. The generic adapter (already wired in
  # v2.1's _ADAPTER_REGISTRY) handles dispatch as a no-op scaffold_into.
  generic:
    pillar: "Bring-your-own-framework"
    type: "curate"
    flavor: "n/a"
    knowledge_anchor: "plugins/launchpad/scaffolders/generic-pattern.md"
    knowledge_anchor_sha256: "3818a851ea9738c041d2e6d64ebab0f1864d03037549f3effa6f8ce17c7f9ebc"
    # No options at v2.1.4 — the user brings the framework, so per-stack
    # options would be meaningless (whatever the user picks gets its own
    # config, not LaunchPad's).
    options_schema: {}
    last_validated: "2026-06-23"
