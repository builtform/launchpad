[pytest]
python_files = test_*.py scaffold_smoke_runner.py scaffold_adversarial_corpus.py
# Both `tests/` and `plugin_stack_adapters/tests/` collected by default.
# The latter holds StackId widening + adapter contract tests; previously
# excluded which silently masked test_stackid_widening's stale 10-count
# assertion until cycle 6 (PR #41).
testpaths = tests plugin_stack_adapters/tests

# Phase 4 v2.1 (DA6 LOCKED): `slow` marks Tier-1.5 tests requiring real
# network calls or filesystem-heavy fixtures (template cache, SIGINT
# subprocess ladders, adapter wrap-and-overlay). Default `pytest` invocations
# collect both Tier-1 + Tier-1.5 unless deselected via `-m "not slow"`.
markers =
    slow: integration tests requiring real git clone, npm, or filesystem-heavy fixtures (Phase 4 v2.1 DA6).
    e2e: end-to-end tests that exercise the full /lp-scaffold-stack pipeline (v2.1.0 completion plan §3.7).
    real_v21_adapters: opt out of the conftest-level autouse `hermetic_v21_adapters` fixture; test wants the production fetcher singletons (network/cache hits).
