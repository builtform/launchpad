pre-push:
  commands:
    # Slip-prevention gate added 2026-05-07. Catches BLs labeled for the
    # current `plugin.json` version that lack a `**Status**:` close
    # marker AND aren't referenced in the matching CHANGELOG block.
    # Skips silently when CHANGELOG has no `## [<version>]` block yet
    # (pre-tag development). See BL-236 slip rationale in BACKLOG.md.
    backlog-orphan-check:
      run: |
        version=$(python3 -c "import json; print(json.load(open('plugins/launchpad/.claude-plugin/plugin.json'))['version'])")
        if grep -q "^## \[$version\]" CHANGELOG.md 2>/dev/null; then
          python3 plugins/launchpad/scripts/plugin-backlog-orphan-check.py --release "$version"
        else
          echo "backlog-orphan-check: skipped (no [$version] block in CHANGELOG.md yet)"
        fi

    # Phase 3 R1-T1-8 + R2-T1-1: pytest direct-binary pre-push entry per
    # master plan D7. Self-host-only by construction: skips silently if
    # plugins/launchpad/scripts/ is absent (downstream consumers cargo-
    # culting this YAML). Phase 4 lint stack additions (bandit, ruff,
    # pyright, semgrep) join the same priority-10 pre-push block.
    pytest:
      glob: "**/*.py"
      priority: 10
      run: |
        [ -d plugins/launchpad/scripts ] || exit 0
        cd plugins/launchpad/scripts && python -m pytest -x -q

    # v2.1.1 Phase 4 — pyright moved from pre-commit to pre-push (R1-T1-1).
    # Reason: `pyright {staged_files}` still type-checks the import closure
    # (~3-10s cold even on one-line edits). Pre-push placement matches
    # pytest precedent — whole-program gates pre-push, file-local pre-commit.
    pyright:
      glob: "**/*.py"
      priority: 10
      run: |
        [ -d plugins/launchpad/scripts ] || exit 0
        cd plugins/launchpad/scripts && pyright

    # v2.1.1 Phase 4 — LaunchPad-internal cross-cutting invariants. Pre-push
    # placement (deeper scan, full scripts tree).
    semgrep-launchpad-internal:
      glob: "**/*.py"
      priority: 10
      run: |
        [ -d plugins/launchpad/.semgrep ] || exit 0
        semgrep --config=plugins/launchpad/.semgrep/launchpad-internal.yml plugins/launchpad/scripts/ --error --metrics=off

commit-msg:
  commands:
    # Per OPERATIONS §0 strip-back-aware Layer 9 P3-2 closure: the commit-msg
    # hook is wired to a Python script (NOT shell) so subject-line injection
    # defenses (\\n / \\r\\n rejection) are enforceable. Appends a
    # restamp-history.jsonl entry on accept.
    restamp-history:
      run: python3 plugins/launchpad/scripts/plugin-restamp-history-hook.py {1}

pre-commit:
  commands:
    # ---- Auto-fixers (run first, fix and re-stage) ----

    prettier-fix:
      glob: "*.{js,jsx,ts,tsx,json,css,md,yml,yaml,html}"
      run: pnpm prettier --write {staged_files}
      stage_fixed: true
      priority: 1

    eslint-fix:
      glob: "*.{js,jsx,ts,tsx,mjs,cjs}"
      exclude: "next-env\\.d\\.ts$"
      run: pnpm eslint --fix {staged_files}
      stage_fixed: true
      priority: 2

    # ---- Read-only checks (block on failure) ----
    # Phase 3 (R1-T1-2 + R1-T1-3 + R2-T1-2): three stages route through
    # build-runner; doublestar glob filters skip on doc-only commits. The
    # lint → typecheck → test order is cheap-fail-fast (lint fastest, test
    # slowest). Doublestar form works in both shallow-default and
    # doublestar-default lefthook glob modes.

    lint:
      glob: "**/*.{js,jsx,ts,tsx,mjs,cjs,py}"
      run: python3 plugins/launchpad/scripts/plugin-build-runner.py --stage=lint
      priority: 10

    typecheck:
      glob: "**/*.{ts,tsx,py}"
      run: python3 plugins/launchpad/scripts/plugin-build-runner.py --stage=typecheck
      priority: 10

    test:
      glob: "**/*.{ts,tsx,js,jsx,mjs,cjs,py}"
      run: python3 plugins/launchpad/scripts/plugin-build-runner.py --stage=test
      priority: 10

    # v2.1.1 Phase 4 — Layer 3 static analysis (DA-4.9). 4 entries fire on
    # **/*.py edits; tests/ excluded (200+ deferred ruff violations there).
    # Self-host-only `[ -d ... ] || exit 0` short-circuit ensures downstream
    # consumers cargo-culting this YAML get silent-skip, not cd-failure.
    # ruff-check + ruff-format-check share `.ruff_cache/`; serialized via
    # priority 11 → 12 (R2-T1-11) — they run AFTER priority-10 entries.

    bandit:
      glob: "**/*.py"
      exclude: "plugins/launchpad/scripts/tests/.*\\.py$"
      run: |
        [ -d plugins/launchpad/scripts ] || exit 0
        bandit -ll {staged_files}
      priority: 10

    ruff-check:
      glob: "**/*.py"
      exclude: "plugins/launchpad/scripts/tests/.*\\.py$"
      run: |
        [ -d plugins/launchpad/scripts ] || exit 0
        ruff check --config plugins/launchpad/scripts/pyproject.toml {staged_files}
      priority: 11

    ruff-format-check:
      glob: "**/*.py"
      exclude: "plugins/launchpad/scripts/tests/.*\\.py$"
      run: |
        [ -d plugins/launchpad/scripts ] || exit 0
        ruff format --check --config plugins/launchpad/scripts/pyproject.toml {staged_files}
      priority: 12

    semgrep-general:
      glob: "**/*.py"
      exclude: "plugins/launchpad/scripts/tests/.*\\.py$"
      run: |
        [ -d plugins/launchpad/.semgrep ] || exit 0
        semgrep --config=plugins/launchpad/.semgrep/general.yml {staged_files} --error --metrics=off
      priority: 10

    structure-check:
      run: bash scripts/maintenance/check-repo-structure.sh
      priority: 10

    # v2.1.0 completion plan §4.4: GitHub Actions tag-pin -> SHA-pin gate.
    # Tag-pinning is mutable; an attacker who compromises an action repo
    # can move the tag to a malicious commit (precedent: tj-actions/
    # changed-files 2025). The 40-char SHA + decorative tag comment
    # pattern is the repo convention (`actions/checkout@<sha> # v6.0.2`).
    # The gate scans both LaunchPad's own workflows and the .j2 workflow
    # templates emitted by /lp-bootstrap.
    workflow-action-sha-pin:
      run: python3 plugins/launchpad/scripts/plugin-workflow-sha-pin-check.py
      priority: 10

    large-file-guard:
      glob: "*.{js,jsx,ts,tsx,json,css,md,yml,yaml,html,sh,mjs,cjs}"
      run: |
        max_size=512000
        violations=""
        while IFS= read -r file; do
          if [ -f "$file" ]; then
            size=$(wc -c < "$file" | tr -d ' ')
            if [ "$size" -gt "$max_size" ]; then
              violations="$violations\n  $file ($(( size / 1024 ))KB)"
            fi
          fi
        done <<< "$(echo "{staged_files}" | tr ' ' '\n')"
        if [ -n "$violations" ]; then
          echo "Files exceed 500KB limit:$violations"
          exit 1
        fi
      priority: 10

    trailing-whitespace:
      glob: "*.{js,jsx,ts,tsx,json,css,md,yml,yaml,html,sh}"
      run: |
        found=0
        while IFS= read -r file; do
          if [ -f "$file" ] && grep -n '[[:blank:]]$' "$file" > /dev/null 2>&1; then
            echo "$file has trailing whitespace:"
            grep -n '[[:blank:]]$' "$file"
            found=1
          fi
        done <<< "$(echo "{staged_files}" | tr ' ' '\n')"
        if [ "$found" -eq 1 ]; then
          exit 1
        fi
      priority: 10

    end-of-file-newline:
      glob: "*.{js,jsx,ts,tsx,json,css,md,yml,yaml,html,sh}"
      run: |
        failed=""
        while IFS= read -r file; do
          if [ -f "$file" ] && [ -s "$file" ]; then
            if [ "$(tail -c 1 "$file" | od -An -tx1 | tr -d ' \n')" != "0a" ]; then
              failed="$failed $file"
            fi
          fi
        done <<< "$(echo "{staged_files}" | tr ' ' '\n')"
        if [ -n "$failed" ]; then
          echo "Files missing final newline:$failed"
          exit 1
        fi
      priority: 10
