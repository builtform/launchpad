# Code review agents — dispatched by /lp-review
review_agents:
  - lp-pattern-finder
  - lp-security-auditor
  - lp-kieran-foad-ts-reviewer
  - lp-performance-auditor
  - lp-code-simplicity-reviewer
  - lp-architecture-strategist
  - lp-testing-reviewer

# DB agents — only when diff touches Prisma files
# Dispatch order defined in /lp-review Step 4 (sequential-then-parallel), not by list order
review_db_agents:
  - lp-schema-drift-detector
  - lp-data-migration-auditor
  - lp-data-integrity-auditor

# Design review agents — dispatched by /lp-review when design artifacts exist
# Artifact-based dispatch: IF .harness/design-artifacts/[section]-approved.png exists
review_design_agents:
  - lp-design-ui-auditor
  - lp-design-responsive-auditor
  - lp-design-alignment-checker
  - lp-design-implementation-reviewer # conditional — only dispatched when Figma artifacts exist

# Copy review agents — dispatched during design workflow by /lp-copy-review
# Populated by downstream projects (e.g., BuiltForm adds copy-auditor)
review_copy_agents: []

# Plan hardening agents — always dispatched by /lp-harden-plan (both intensities)
harden_plan_agents:
  - lp-pattern-finder
  - lp-security-auditor
  - lp-performance-auditor
  - lp-spec-flow-analyzer

# Conditional plan hardening agents — dispatched by /lp-harden-plan (full only)
harden_plan_conditional_agents:
  - lp-architecture-strategist
  - lp-code-simplicity-reviewer
  - lp-frontend-races-reviewer
  - lp-schema-drift-detector

# Document-review agents — dispatched by /lp-harden-plan Step 3.5
# These review the plan DOCUMENT (not code) with multiple lenses
harden_document_agents:
  - lp-adversarial-document-reviewer
  - lp-coherence-reviewer
  - lp-feasibility-reviewer
  - lp-scope-guardian-reviewer
  - lp-product-lens-reviewer
  - lp-security-lens-reviewer
  - lp-design-lens-reviewer # Conditional: /lp-harden-plan skips when "design:skipped"

# Opt-in agents — not dispatched by default. Names follow the lp- prefix
# convention so they resolve correctly under the runtime resolver if a user
# uncomments and moves them into an active list.
# To enable for /lp-review: move to review_agents
# To enable for /lp-harden-plan: move to appropriate harden list
#   - lp-deployment-verification-agent
#   - lp-frontend-races-reviewer      # already in harden conditional
#   - lp-kieran-foad-python-reviewer

# Protected branches — read by /lp-ship, /lp-commit, /lp-resolve-pr-comments (with default [main, master])
protected_branches:
  - main
  - master
