# .launchpad/config.yml — seeded by /lp-define from detected stack
#
# Sections: stacks (v2.1 top-level array of detected stack ids), pipeline
# (stage toggles), commands (shell invocations), paths (canonical
# locations). Edit freely; /lp-define won't overwrite this file without
# your explicit consent (interactive per-file prompt). To re-detect the
# stack id after refactoring, run `/lp-define --redetect-stack --force`.

stacks: [python_generic, ts_monorepo]

pipeline:
  brainstorm: enabled
  define:
    product: enabled
    design: enabled
    architecture: enabled
    sections: enabled
  plan:
    design_review: enabled
    pnf: enabled
    harden: enabled
  build:
    inf: enabled
    review: enabled
    resolve: enabled
    test_browser: enabled
    ship: enabled
    learn: enabled

commands:
  test:
    - "pnpm test"
    # pytest moved to direct pre-push lefthook entry in same Phase 3
    # commit (R1-T1-8). See lefthook.yml `pre-push:commands:pytest:` block.
    # Per master plan D7: pytest in pre-PUSH, not pre-commit.
  typecheck:
    - "pnpm typecheck"
  lint:
    - "pnpm lint"
  format:
    - "pnpm format"
  build:
    - "pnpm build"

paths:
  architecture_dir: "docs/architecture"
  tasks_dir: "docs/tasks"
  sections_dir: "docs/tasks/sections"
  # Plan file location (per-section). Placeholders: {section_name}
  # Default places each plan alongside its spec in sections_dir.
  # Commands that read this: /lp-pnf, /lp-harden-plan, /lp-plan, /lp-build.
  plans_file_pattern: "docs/tasks/sections/{section_name}-plan.md"
  reports_dir: "docs/reports"
  solutions_dir: "docs/solutions"
  brainstorms_dir: "docs/brainstorms"
  harness_dir: ".harness"
  launchpad_dir: ".launchpad"

# Overwrite behavior for /lp-define when rescaffolding
# skip    — never overwrite
# prompt  — interactive per-file menu (default)
# force   — overwrite without asking
overwrite: prompt

# Audit log for autonomous-mode invocations
# committed: false  — gitignored (per-user debug log, recommended)
# committed: true   — tracked in git (team PR visibility; causes merge conflicts)
audit:
  committed: false
